<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>문의 폼</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='style.css') }}" />
    </head>
    
    <body>
        <h2>문의 폼</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul style="border: 2px solid black; background-color: #ffffff; color: black; padding: 15px 15px 15px 40px; list-style: disc; border-radius: 0px; margin-bottom: 20px;">
            {% for message in messages %}
            <li class="flash">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
    
        <form
            action="{{ url_for('contact_complete') }}"
            method="POST"
            novalidate="novalidate">
            <table>
                <tr>
                    <td>사용자명</td>
                    <td>
                        <input
                            type="text"
                            name="username"
                            value="{{ username if username else '' }}"
                            placeholder="사용자명"
                        />
                    </td>
                </tr>
                <tr>
                    <td>메일 주소</td>
                    <td>
                        <input
                            type="text"
                            name="email"
                            value="{{ email if email else '' }}"
                            placeholder="메일 주소"
                        />
                    </td>
                </tr>
                <tr>
                    <td>문의 내용</td>
                    <td>
                        <textarea name="description" placeholder="문의 내용">{{ description if description else '' }}</textarea>
                    </td>
                </tr>
            </table>
            <input type="submit" value="문의" />
        </form>
    </body>
</html>
